<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width='device-width', initial-scale=1.0">
    <link rel="Stylesheet" href="fornecedor.css">
    <title>Cadasto de Produtos</title>
</head>


<header>
    <img src="images/logo.png" alt="Logo da loja" class="logo">
</header>

<body>

    <div class="pai">

        <h1> Cadastro de Empresas </h1>

        <span> Preencha todos os campos abaixo </span>
        <hr>

        <nav class="caixa">
            <h2> 1. Razão Social (Nome da Empresa) </h2>
            <input placeholder="Digite o nome completo da Empresa" />
        </nav>
        <hr>

        <nav class="caixa">
            <h2> 2. CNPJ </h2>
            <input placeholder="Digite o CNPJ da Empresa (apenas números)" />
        </nav>
        <hr>

        <nav class="caixa">
            <h2> 3. Telefone </h2>
            <input placeholder="Digite o telefone da Empresa (apenas números)" />
        </nav>
        <hr>

        <nav class="caixa">
            <h2> 4. E-Mail </h2>
            <input placeholder="Digite o principal e-mail válida da Empresa" />
        </nav>
        <hr>

        <nav class="caixa">
            <h2> 5. Nome do Responsável </h2>
            <input placeholder="Digite nome da pessoa responsável pela Empresa" />
        </nav>
        <hr>

        <nav class="caixa">
            <h2> 6. Tipo de Fornecimento </h2>
            <input placeholder="Escreva o tipo de fornecimento da Empresa" />
        </nav>
        <hr>


        <span> Projeto educativo </span>

        <a href="../index.html">Voltar para Página inicial </a>

    </div>


</body>

</html>
