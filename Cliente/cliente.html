<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width='device-width', initial-scale=1.0">
    <link rel="Stylesheet" href="cliente.css">
    <title>Cadasto de Produtos</title>
</head>


<header>
    <img src="Images/logo.png" alt="Logo da loja" class="logo">
</header>

<body>

    <div class="pai">

        <h1> Cadastro de Clientes </h1>

        <span> Preencha todos os campos abaixo </span>
        <hr>

        <nav class="caixa">
            <h2> 1. Nome Completo </h2>
            <input placeholder="Digite seu nome completo" />
        </nav>
        <hr>

        <nav class="caixa">
            <h2> 2. CPF </h2>
            <input placeholder="Digite seu CPF (apenas números)" />
        </nav>
        <hr>

        <nav class="caixa">
            <h2> 3. Data de nascimento </h2>
            <input placeholder="Digite sua data de nascimento (apenas números)" />
        </nav>
        <hr>

        <nav class="caixa">
            <h2> 4. E-Mail </h2>
            <input placeholder="Digite uma conta de e-mail válida" />
        </nav>
        <hr>

        <nav class="caixa">
            <h2> 5. Telefone/Whatsapp </h2>
            <input placeholder="Digite seu número de telefone/Whatsapp (apenas números)" />
        </nav>
        <hr>

        <nav class="caixa">
            <h2> 6. Cidade e Estado </h2>
            <input placeholder="Escreva o nome da sua cidade e do seu estado" />
        </nav>
        <hr>


        <span> Projeto educativo </span>
         <a href="../index.html" class="botao-voltar">Voltar para Página inicial</a>

    </div>


</body>

</html>
