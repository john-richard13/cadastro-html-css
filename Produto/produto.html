<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width='device-width', initial-scale=1.0">
    <link rel="Stylesheet" href="produto.css">
    <title>Cadasto de Produtos</title>
</head>


<header>
    <img src="images/logo.png" alt="Logo da loja" class="logo">
</header>

<body>

    <div class="pai">

        <h1> Cadastro de Produtos </h1>

        <span> Preencha todos os campos abaixo </span>
        <hr>

        <nav class="caixa">
            <h2> 1. Nome do Produto </h2>
            <input placeholder="Digite o nome do produto" />
        </nav>
        <hr>

        <nav class="caixa">
            <h2> 2. Código (SKU) </h2>
            <input placeholder="Digite o código (apenas números)" />
        </nav>
        <hr>

        <nav class="caixa">
            <h2> 3. Preço (R$) </h2>
            <input placeholder="Digite o valor do produto (apenas números)" />
        </nav>
        <hr>

        <nav class="caixa">
            <h2> 4. Quantidade em estoque </h2>
            <input placeholder="Digite a quantidade de produto em estoque (apenas números)" />
        </nav>
        <hr>

        <nav class="caixa">
            <h2> 5. Categoria </h2>
            <input placeholder="Indique, abaixo, a categoria do produto" />
        </nav>
        <hr>

        <nav class="caixa">
            <h2> 6. Descrição do produto </h2>
            <input placeholder="Descreva brevemente o produto cadastrado" />
        </nav>
        <hr>


        <span> Projeto educativo </span>
        
        <a href="../index.html" class="botao-voltar">Voltar para Página inicial</a>

    </div>


</body>

</html>
